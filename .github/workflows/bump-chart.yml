name: Bump Helm chart version

on:
  pull_request:
    #types: [ closed ]
    #branches: [ main ]
    paths: [ 'charts/*/Chart.yaml' ]

jobs:
  bump:
    #if: github.event.pull_request.merged == true
    if: github.event.pull_request.user.login == 'renovate[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Configure Git
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"

      - name: Install deps
        run: |
          pip install pyyaml semver

      - name: Bump chart versions
        run: |
          for file in $(git diff --name-only origin/${{ github.base_ref }} HEAD | grep Chart.yaml || true); do
            OLD_APP=$(git show origin/${{ github.base_ref }}:${file} | yq '.appVersion')
            OLD_CHART=$(git show origin/${{ github.base_ref }}:${file} | yq '.version')
            python scripts/bump_chart_version.py --in-place "${file}" "${OLD_APP}" "${OLD_CHART}"
          done

      - name: Commit changes
        run: |
          git add charts/*/Chart.yaml
          git diff --cached --quiet || git commit -m "chore: bump chart versions"
          git push
